version: '3.9'

services:
  mongodb:
    image: mongo:latest
    container_name: hoopflex_db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: hoopflex
    volumes:
      - mongo_data:/data/db
    networks:
      - hoopflex_net

  backend:
    build: ./hoopflex-backend
    container_name: hoopflex_api
    ports:
      - "8000:8000"
    environment:
      MONGODB_URL: mongodb://mongodb:27017/hoopflex
    depends_on:
      - mongodb
    volumes:
      - ./hoopflex-backend:/app
    networks:
      - hoopflex_net
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  mongo_data:

networks:
  hoopflex_net:
    driver: bridge
