name: CI/CD Pipeline (Monorepo)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ============== FRONTEND (React Native) ==============
  frontend-lint:
    runs-on: ubuntu-latest
    name: Frontend - Lint & Format
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'HoopFlex/package.json'
      
      - name: Install dependencies
        working-directory: HoopFlex
        run: npm install
      
      - name: Run ESLint
        working-directory: HoopFlex
        run: npm run lint
        continue-on-error: true
      
      - name: Check code format
        working-directory: HoopFlex
        run: npm run format:check
        continue-on-error: true

  frontend-build:
    runs-on: ubuntu-latest
    name: Frontend - Build
    needs: frontend-lint
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'HoopFlex/package.json'
      
      - name: Install dependencies
        working-directory: HoopFlex
        run: npm install
      
      - name: Check Expo setup
        working-directory: HoopFlex
        run: npx expo doctor --fix-deps
        continue-on-error: true
      
      - name: Security audit
        working-directory: HoopFlex
        run: npm audit --audit-level=moderate
        continue-on-error: true

  # ============== BACKEND (FastAPI) ==============
  backend-test:
    runs-on: ubuntu-latest
    name: Backend - Tests
    
    services:
      mongodb:
        image: mongo:latest
        options: >-
          --health-cmd mongosh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        working-directory: hoopflex-backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov black flake8
      
      - name: Run Black formatter check
        working-directory: hoopflex-backend
        run: black --check .
        continue-on-error: true
      
      - name: Run Flake8 linter
        working-directory: hoopflex-backend
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        continue-on-error: true
      
      - name: Run pytest
        working-directory: hoopflex-backend
        run: pytest --cov=. --cov-report=xml
        continue-on-error: true
        env:
          MONGODB_URL: mongodb://localhost:27017
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./hoopflex-backend/coverage.xml
        continue-on-error: true

  backend-build:
    runs-on: ubuntu-latest
    name: Backend - Build
    needs: backend-test
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        working-directory: hoopflex-backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Verify imports and syntax
        working-directory: hoopflex-backend
        run: python -m py_compile main.py
      
      - name: Check for security issues
        working-directory: hoopflex-backend
        run: |
          pip install bandit
          bandit -r . -ll
        continue-on-error: true

  # ============== DOCKER BUILD ==============
  docker-build:
    runs-on: ubuntu-latest
    name: Docker Build
    needs: [ frontend-build, backend-build ]
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Build Docker Compose
        run: docker-compose build
        continue-on-error: true
